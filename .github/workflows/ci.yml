name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test ./... -v

      - name: Run vulnerability scan (govulncheck) and fail on findings
        run: |
          set -euo pipefail
          # Install govulncheck
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Run govulncheck in JSON mode and save output
          govulncheck -json ./... > gov.json || true
          # Install jq for parsing
          sudo apt-get update && sudo apt-get install -y jq
          # Count vulnerabilities by finding all .Vulns arrays anywhere in the JSON
          count=$(jq '[.. | .Vulns? // empty | .[]] | length' gov.json)
          echo "govulncheck found vulnerabilities: $count"
          if [ "$count" -gt 0 ]; then
            echo "Failing CI because govulncheck reported vulnerabilities"
            cat gov.json
            exit 1
          fi
