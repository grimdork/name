version: 2
project_name: name
before:
  hooks:
    - go mod download

builds:
  - id: client
    dir: .
    main: .
    binary: name
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.date={{.CommitDate}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64

release:
  prerelease: true

archives:
  - wrap_in_directory: true
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# Homebrew (v2 schema)
brews:
  - name: name
    repository:
      owner: grimdork
      name: homebrew-tools
    commit_author:
      name: grimdork
      email: github@grimdork.net
    homepage: "https://github.com/grimdork/name"
    description: "Small utility for path/name manipulation"
    license: MIT
    # directory is optional; leave default. skip_upload left unset so upstream publishing can be controlled by CI/actions

# NFPM (packaging) — conservative v2 fields
nfpm:
  - package_name: name
    vendor: "grimdork.net"
    maintainer: "Grimdork <github@grimdork.net>"
    homepage: "https://github.com/grimdork/name"
    description: "Small utility for path/name manipulation"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: "/usr/bin"
    section: contrib
    priority: extra
    contents:
      - src: LICENSE
        dst: "/usr/share/doc/name/LICENSE"
      - src: README.md
        dst: "/usr/share/doc/name/README.md"

# Binary signing (v2: BinarySign)
# conservative: sign binaries (not checksums). Adjust cmd/args if you need a different signer.
signs:
  - id: gpg-sign
    cmd: gpg
    args:
      - --batch
      - --pinentry-mode
      - loopback
      - --local-user
      - "{{ .Env.GPG_FINGERPRINT }}"
      - --output
      - "${signature}"
      - --detach-sign
      - "${artifact}"
    artifacts: binary
